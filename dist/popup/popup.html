<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Virtual Tab Groups</title><link rel="stylesheet" href="popup.css"></head><body><header id="topBar"><h1 id="appTitle">Tab Groups</h1><div id="headerActions"><button id="btnSearch" class="icon-btn" title="Search tabs" aria-label="Search tabs"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button> <button id="btnOverflow" class="icon-btn" title="More options" aria-label="More options"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg></button></div></header><div id="searchBar" class="hidden"><input type="text" id="searchInput" placeholder="Search tabs…" autocomplete="off"> <button id="btnSearchClose" class="icon-btn" aria-label="Close search"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div><nav id="tabNav"><button class="nav-tab active" data-panel="tabsPanel">Tabs</button> <button class="nav-tab" data-panel="bookmarksPanel">Bookmarks</button> <button class="nav-tab" data-panel="snapshotsPanel">Snapshots</button><div id="navIndicator"></div></nav><div id="selectionBar" class="hidden"><button id="btnCancelSelect" class="icon-btn" aria-label="Cancel selection"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button> <span id="selectionCount">0 selected</span> <button id="btnSelectAllDomain" class="text-btn" title="Select all from same domain">Same domain</button> <button id="btnSelectAll" class="text-btn">All</button></div><main id="panelContainer"><section id="tabsPanel" class="panel active"><div id="tabList" class="scroll-list" role="list"></div><div id="emptyState" class="empty-state hidden"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--text-tertiary)" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><p>No open tabs found</p></div></section><section id="bookmarksPanel" class="panel"><div class="panel-header-toolbar" style="display:flex;justify-content:flex-end;padding:8px 16px"><button id="btnRefreshCollections" class="secondary-btn small" title="Sync Raindrop Collections"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="margin-right:6px"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg> Sync</button></div><div id="bookmarkTree" class="scroll-list" role="tree"></div><div id="bookmarkErrorState" class="empty-state hidden"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--danger)" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><p id="bookmarkErrorMessage">API Key required</p><button id="btnBookmarkOpenSettings" class="primary-btn">Open Settings</button></div></section><section id="snapshotsPanel" class="panel"><div id="snapshotList" class="scroll-list" role="list"></div><div id="snapshotEmpty" class="empty-state"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--text-tertiary)" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg><p>No snapshots yet</p><button id="btnSnapshotEmptyCreate" class="primary-btn">Take snapshot</button></div></section></main><div id="bottomToolbar" class="hidden"><button id="btnAddToGroup" class="toolbar-btn" data-action="addToGroup"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg> <span>Group</span></button> <button id="btnSaveBookmark" class="toolbar-btn" data-action="saveBookmark"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg> <span>Save</span></button> <button id="btnCloseTabs" class="toolbar-btn" data-action="closeTabs"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> <span>Close</span></button> <button id="btnOpenAll" class="toolbar-btn" data-action="openAll"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/></svg> <span>Open</span></button></div><div id="overflowMenu" class="menu-overlay hidden"><div class="menu-backdrop"></div><div class="menu-sheet"><button class="menu-item" id="menuQuickSave"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg> Save current tab</button> <button class="menu-item" id="menuAddCurrentToGroup"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg> Add current tab to group</button><hr class="menu-divider"><button class="menu-item" id="menuSnapshot"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg> Snapshot all tabs</button><hr class="menu-divider"><button class="menu-item" id="menuSettings"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg> Settings</button></div></div><div id="groupPickerModal" class="modal-overlay hidden"><div class="modal-backdrop"></div><div class="modal-sheet"><div class="modal-header"><h2>Add to Group</h2><button class="icon-btn modal-close" aria-label="Close"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div><div id="groupPickerList" class="modal-list"></div><button id="btnNewGroup" class="new-group-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> New Group</button></div></div><div id="groupEditModal" class="modal-overlay hidden"><div class="modal-backdrop"></div><div class="modal-sheet"><div class="modal-header"><h2 id="groupEditTitle">New Group</h2><button class="icon-btn modal-close" aria-label="Close"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div><input type="text" id="groupNameInput" class="modal-input" placeholder="Group name" autocomplete="off"><div id="colorPicker" class="color-picker"></div><div class="modal-actions"><button id="btnGroupCancel" class="secondary-btn">Cancel</button> <button id="btnGroupSave" class="primary-btn">Create</button></div></div></div><div id="folderPickerModal" class="modal-overlay hidden"><div class="modal-backdrop"></div><div class="modal-sheet modal-tall"><div class="modal-header"><h2>Save to Collection</h2><button class="icon-btn modal-close" aria-label="Close"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div><div id="folderPickerError" class="modal-error hidden"></div><div id="folderTree" class="modal-list scroll-list"></div><div class="folder-create-row"><input type="text" id="newFolderName" class="modal-input" placeholder="New collection name" autocomplete="off"> <button id="btnCreateFolder" class="primary-btn small">Create</button></div><div class="modal-actions"><label class="checkbox-label"><input type="checkbox" id="chkCloseSaved"> Close tabs after saving</label> <button id="btnSaveToFolder" class="primary-btn">Save here</button></div></div></div><div id="confirmModal" class="modal-overlay hidden"><div class="modal-backdrop"></div><div class="modal-sheet modal-compact"><p id="confirmMessage"></p><div class="modal-actions"><button id="btnConfirmCancel" class="secondary-btn">Cancel</button> <button id="btnConfirmOk" class="primary-btn danger">Confirm</button></div></div></div><div id="settingsModal" class="modal-overlay hidden"><div class="modal-backdrop"></div><div class="modal-sheet"><div class="modal-header"><h2>Settings</h2><button class="icon-btn modal-close" aria-label="Close"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div><div class="settings-group"><label class="settings-label" for="raindropTokenInput">Raindrop.io Test Token</label> <input type="password" id="raindropTokenInput" class="modal-input" placeholder="Paste your API token here" autocomplete="off"><p class="settings-help">Get an API token from Raindrop.io &rarr; Settings &rarr; Integrations &rarr; Test Token.</p><div id="apiStatusMessage" class="status-msg hidden"></div></div><div class="modal-actions"><button id="btnTestApi" class="secondary-btn">Test Connection</button> <button id="btnSaveSettings" class="primary-btn">Save</button></div></div></div><div id="toast" class="toast hidden" role="status" aria-live="polite"></div><script src="popup.js" type="module"></script></body></html>
